name: README Chores

on:
  push:
    paths:
      - 'app/build.gradle.kts'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        run: |
          # Use sed to find the line with versionName and extract the numbers/dots
          VERSION=$(grep 'versionName =' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          # Use sed to find the bolded v<VERSION> pattern and replace it
          sed -i -E "s/\*\*v[0-9.]+\*\*/\*\*v$VERSION\*\*/g" README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update version to v${{ steps.get_version.outputs.VERSION }}" && git push)
